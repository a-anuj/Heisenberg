<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clinical Triage Agent UI</title>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #111216;
        color: #e0e0e0;
      }
      .container {
        display: grid;
        grid-template-columns: 340px 1.1fr 1.6fr;
        grid-template-rows: 70px 1fr;
        gap: 24px;
        max-width: 100vw;
        height: 100vh;
        box-sizing: border-box;
        padding: 32px 24px 24px 24px;
      }
      .header {
        grid-column: 1 / 4;
        grid-row: 1;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 0 12px 0;
      }
      .header h1 {
        font-size: 1.35em;
        font-weight: 600;
        color: #fff;
        margin: 0;
      }
      .header .status {
        background: #23242a;
        color: #e0e0e0;
        border-radius: 18px;
        padding: 7px 22px;
        font-size: 1em;
        font-weight: 500;
        letter-spacing: 0.04em;
      }
      .panel {
        background: #18191c;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.13);
        padding: 28px 24px 18px 24px;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .panel h2 {
        color: #b0b8c1;
        font-size: 1.08em;
        font-weight: 600;
        margin: 0 0 18px 0;
        letter-spacing: 0.04em;
      }
      .panel h3 {
        color: #b0b8c1;
        font-size: 0.98em;
        margin: 18px 0 8px 0;
        font-weight: 500;
      }
      .env-setup {
        margin-bottom: 18px;
      }
      .env-setup label {
        font-size: 0.98em;
        color: #b0b8c1;
        margin-bottom: 4px;
        display: block;
      }
      .env-setup select,
      .env-setup button {
        margin-right: 8px;
      }
      .env-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-bottom: 18px;
      }
      .env-box {
        background: #23242a;
        border-radius: 8px;
        padding: 14px 12px 10px 16px;
        color: #e0e0e0;
        font-size: 1em;
        min-height: 48px;
      }
      .env-box strong {
        display: block;
        color: #888;
        font-size: 0.82em;
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .action-input label {
        font-size: 0.98em;
        color: #b0b8c1;
        margin-bottom: 4px;
        display: block;
      }
      .action-input select,
      .action-input input {
        width: 100%;
        margin-bottom: 10px;
        background: #23242a;
        color: #e0e0e0;
        border: 1px solid #333;
        border-radius: 6px;
        padding: 8px 12px;
        font-size: 1em;
      }
      .action-input button {
        width: 100%;
        background: #fff;
        color: #18191c;
        font-weight: 600;
        border-radius: 6px;
        border: none;
        padding: 12px 0;
        font-size: 1.08em;
        margin-top: 10px;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .action-input button:hover {
        background: #007acc;
        color: #fff;
      }
      .metrics-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 18px;
      }
      .metric-box {
        background: #23242a;
        border-radius: 8px;
        padding: 18px 12px 10px 18px;
        color: #e0e0e0;
        font-size: 1.1em;
        min-height: 48px;
      }
      .metric-box strong {
        display: block;
        color: #b0b8c1;
        font-size: 0.82em;
        margin-bottom: 3px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .payload-box,
      .feedback-box {
        background: #18191c;
        border: 1px solid #23242a;
        border-radius: 8px;
        padding: 14px 12px 10px 16px;
        color: #b0ffb3;
        font-size: 1em;
        min-height: 70px;
        margin-bottom: 14px;
      }
      .feedback-box {
        color: #b0b8c1;
      }
      .observation-panel {
        background: #18191c;
        border-radius: 12px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.13);
        padding: 24px 24px 18px 24px;
        display: flex;
        flex-direction: column;
        min-width: 0;
        height: 100%;
      }
      .observation-panel h2 {
        color: #b0b8c1;
        font-size: 1.08em;
        font-weight: 600;
        margin: 0 0 18px 0;
        letter-spacing: 0.04em;
      }
      .observation-panel pre {
        background: #18191c;
        color: #3cff7a;
        border: none;
        font-size: 1em;
        padding: 0;
        margin: 0;
        max-height: 70vh;
        overflow-y: auto;
      }
      .panel-left {
        grid-column: 1;
        grid-row: 2;
      }
      .panel-center {
        grid-column: 2;
        grid-row: 2;
      }
      .panel-right {
        grid-column: 3;
        grid-row: 2;
      }
      @media (max-width: 1100px) {
        .container {
          grid-template-columns: 1fr 1fr;
          grid-template-rows: 70px 1fr 1fr;
        }
        .panel-left {
          grid-column: 1;
          grid-row: 2;
        }
        .panel-center {
          grid-column: 2;
          grid-row: 2;
        }
        .panel-right {
          grid-column: 1 / 3;
          grid-row: 3;
        }
      }
      @media (max-width: 900px) {
        .container {
          grid-template-columns: 1fr;
          grid-template-rows: auto auto auto auto;
          height: auto;
          min-height: unset;
        }
        .header {
          grid-column: 1;
          grid-row: 1;
          padding: 24px 10px 12px 10px;
        }
        .panel-left {
          grid-column: 1;
          grid-row: 2;
        }
        .panel-center {
          grid-column: 1;
          grid-row: 3;
        }
        .panel-right {
          grid-row: 4;
          grid-column: 1;
          padding: 24px 10px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Clinical Triage Agent</h1>
        <div class="status" id="val_done">NOT STARTED</div>
      </div>

      <!-- Left: Environment Setup & Action Input -->
      <div class="panel panel-left">
        <h2>ENVIRONMENT SETUP</h2>
        <div class="env-setup">
          <label for="task_id">Task Scenario:</label>
          <select id="task_id">
            <option value="0">0 (Easy - 3 patients)</option>
            <option value="1">1 (Medium - 8 patients)</option>
            <option value="2">2 (Hard - 20 patients)</option>
          </select>
          <button onclick="resetEnv()">Reset</button>
        </div>
        <div class="env-grid" id="state_info">
          <div class="env-box">
            <strong>Step</strong><span id="val_step">-</span>
          </div>
          <div class="env-box">
            <strong>Budget</strong><span id="val_budget">-</span>
          </div>
          <div class="env-box">
            <strong>Pend/Tot</strong><span id="val_patients">- / -</span>
          </div>
          <div class="env-box">
            <strong>Episode ID</strong><span id="val_episode">-</span>
          </div>
        </div>
        <div class="action-input">
          <h3>ACTION INPUT</h3>
          <label for="action_type">Action Type:</label>
          <select id="action_type" onchange="updateActionForm()">
            <option value="ASK">ASK (Reveal Info)</option>
            <option value="TRIAGE">TRIAGE</option>
            <option value="ESCALATE">ESCALATE</option>
            <option value="NO_OP">NO_OP</option>
          </select>
          <div id="patient_select_container">
            <label for="arg_patient_id">Target Patient:</label>
            <select id="arg_patient_id"></select>
          </div>
          <div id="action_form"></div>
          <button onclick="runStep()">Execute Action Step</button>
        </div>
      </div>

      <!-- Center: Metrics & Feedback -->
      <div class="panel panel-center">
        <h2>PERFORMANCE METRICS</h2>
        <div class="metrics-grid">
          <div class="metric-box">
            <strong>Step Reward</strong><span id="val_reward">0.00</span>
          </div>
          <div class="metric-box">
            <strong>Cumulative Reward</strong
            ><span id="val_total_reward">0.00</span>
          </div>
        </div>
        <h3>LAST PAYLOAD SENT</h3>
        <pre class="payload-box" id="display_action">{}</pre>
        <h3>GRADER FEEDBACK</h3>
        <pre class="feedback-box" id="display_info">{}</pre>
      </div>

      <!-- Right: Observation -->
      <div class="observation-panel panel-right">
        <h2>GLOBAL STATE & OBSERVATION</h2>
        <pre id="display_observation">
Press "Reset" on the left to initialize state...</pre
        >
      </div>
    </div>

    <script>
      let totalReward = 0.0;
      let currentObservation = null;

      async function loadState() {
        try {
          const res = await fetch("/state");
          const data = await res.json();
          document.getElementById("val_episode").innerText =
            data.episode_id || "-";
          document.getElementById("val_step").innerText = data.step_count;
          document.getElementById("val_budget").innerText =
            data.budget_remaining !== null ? data.budget_remaining : "-";
          document.getElementById("val_patients").innerText =
            `${data.n_pending !== null ? data.n_pending : "-"} / ${data.n_patients !== null ? data.n_patients : "-"}`;
          if (
            data.episode_id &&
            document.getElementById("val_done").innerText === "NOT STARTED"
          ) {
            document.getElementById("val_done").innerText = "IN PROGRESS";
          }
        } catch (e) {
          console.error("Failed to load state", e);
        }
      }

      function populatePatientDropdown() {
        const select = document.getElementById("arg_patient_id");
        const prevValue = select.value;
        select.innerHTML = "";

        if (
          currentObservation &&
          currentObservation.patient_queue &&
          currentObservation.patient_queue.length > 0
        ) {
          currentObservation.patient_queue.forEach((p) => {
            const opt = document.createElement("option");
            opt.value = p.patient_id;
            opt.innerText = p.patient_id;
            select.appendChild(opt);
          });
          // Try to keep previously selected value if still in queue
          if (Array.from(select.options).some((o) => o.value === prevValue)) {
            select.value = prevValue;
          }
        } else {
          const opt = document.createElement("option");
          opt.value = "";
          opt.innerText = "Please 'Reset Environment' first";
          select.appendChild(opt);
        }
      }

      async function resetEnv() {
        const taskId = parseInt(document.getElementById("task_id").value);
        try {
          const res = await fetch("/reset", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task_id: taskId, seed: 42 }),
          });
          const data = await res.json();

          totalReward = 0.0;
          currentObservation = data.observation;

          document.getElementById("val_reward").innerText = "0.0";
          document.getElementById("val_total_reward").innerText = "0.0";
          document.getElementById("val_done").innerText = "IN PROGRESS";

          document.getElementById("display_observation").innerText =
            JSON.stringify(data.observation, null, 2);
          document.getElementById("display_action").innerText = "{}";
          document.getElementById("display_info").innerText = "{}";

          populatePatientDropdown();
          updateActionForm();
          loadState();
        } catch (e) {
          alert("Error resetting environment" + e);
        }
      }

      function updateActionForm() {
        const type = document.getElementById("action_type").value;
        const form = document.getElementById("action_form");
        const patientContainer = document.getElementById(
          "patient_select_container",
        );
        let html = "";

        if (type === "NO_OP") {
          patientContainer.style.display = "none";
        } else {
          patientContainer.style.display = "block";
        }

        if (type === "ASK") {
          html += `<select id="arg_question">
                <option value="pain_scale">Pain Scale</option>
                <option value="duration">Duration</option>
                <option value="history">History</option>
                <option value="medications">Medications</option>
            </select>`;
        } else if (type === "TRIAGE") {
          html += `
            <select id="arg_level">
                <option value="1">1 - Resuscitation</option>
                <option value="2">2 - Emergent</option>
                <option value="3">3 - Urgent</option>
                <option value="4">4 - Less Urgent</option>
                <option value="5">5 - Non-Urgent</option>
            </select>
            <select id="arg_pathway">
                <option value="resus">Resus</option>
                <option value="majors">Majors</option>
                <option value="minors">Minors</option>
                <option value="fast_track">Fast Track</option>
                <option value="ambulatory">Ambulatory</option>
            </select>
            `;
        }
        form.innerHTML = html;
      }

      async function runStep() {
        if (document.getElementById("val_done").innerText === "DONE") {
          alert("Episode is already done. Please reset.");
          return;
        }

        const type = document.getElementById("action_type").value;
        const actionPayload = { type: type };

        if (type !== "NO_OP") {
          const pid = document.getElementById("arg_patient_id").value;
          if (!pid) {
            alert("No valid patient selected!");
            return;
          }
          actionPayload.patient_id = pid;
        }

        if (type === "ASK") {
          actionPayload.question_key =
            document.getElementById("arg_question").value;
        } else if (type === "TRIAGE") {
          actionPayload.level = parseInt(
            document.getElementById("arg_level").value,
          );
          actionPayload.pathway = document.getElementById("arg_pathway").value;
        }

        document.getElementById("display_action").innerText = JSON.stringify(
          actionPayload,
          null,
          2,
        );

        try {
          const res = await fetch("/step", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action: actionPayload }),
          });

          if (!res.ok) {
            const errorData = await res.json();
            document.getElementById("display_info").innerText = JSON.stringify(
              errorData,
              null,
              2,
            );
            return;
          }

          const data = await res.json();

          totalReward += data.reward;
          currentObservation = data.observation;

          document.getElementById("val_reward").innerText =
            data.reward.toFixed(2);
          document.getElementById("val_total_reward").innerText =
            totalReward.toFixed(2);
          document.getElementById("val_done").innerText = data.done
            ? "DONE"
            : "IN PROGRESS";

          document.getElementById("display_observation").innerText =
            JSON.stringify(data.observation, null, 2);
          document.getElementById("display_info").innerText = JSON.stringify(
            data.info,
            null,
            2,
          );

          populatePatientDropdown();
          loadState();
        } catch (e) {
          alert("Error running step" + e);
        }
      }

      // Initialize
      updateActionForm();
      populatePatientDropdown();
      loadState();
    </script>
  </body>
</html>
